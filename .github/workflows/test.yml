name: Unity Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: unity-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-license:
    name: Check Unity License
    runs-on: ubuntu-latest
    outputs:
      has-license: ${{ steps.check.outputs.has-license }}
    steps:
      - id: check
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -n "$UNITY_LICENSE" ]; then
            echo "has-license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-license=false" >> "$GITHUB_OUTPUT"
            echo "::warning::UNITY_LICENSE is not set. Skipping tests. See SECURITY.md for setup instructions."
          fi

  test-editmode:
    name: Edit Mode Tests
    needs: check-license
    if: needs.check-license.outputs.has-license == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4
        id: editmode-tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          testMode: EditMode
          unityVersion: auto
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: editmode-results
          path: artifacts/
          retention-days: 7
